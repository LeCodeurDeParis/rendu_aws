<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitation Trellu</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:system-ui,-apple-system,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:8px;padding:40px;border:1px solid #e4e4e7;">
          <tr>
            <td>
              <h1 style="margin:0 0 24px;font-size:24px;color:#09090b;">Trellu</h1>
              <p style="margin:0 0 16px;font-size:16px;color:#3f3f46;line-height:1.6;">
                <strong>{{inviterName}}</strong> vous invite à rejoindre l'équipe <strong>{{teamName}}</strong> sur Trellu.
              </p>
              <p style="margin:0 0 32px;font-size:14px;color:#71717a;line-height:1.6;">
                Cliquez sur le bouton ci-dessous pour accepter l'invitation et accéder aux projets de l'équipe.
              </p>
              <a href="{{acceptUrl}}"
                 style="display:inline-block;padding:12px 32px;background:#18181b;color:#fff;text-decoration:none;border-radius:6px;font-size:14px;font-weight:500;">
                Accepter l'invitation
              </a>
              <p style="margin:32px 0 0;font-size:12px;color:#a1a1aa;line-height:1.6;">
                Si vous n'attendiez pas cette invitation, vous pouvez ignorer cet email.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
