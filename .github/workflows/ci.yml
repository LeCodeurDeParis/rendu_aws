name: CI/CD

on:
  push:
    branches: [dev, main]

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: eu-north-1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint

  deploy_staging:
    if: github.ref == 'refs/heads/dev'
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install boto3 python-dotenv psycopg2-binary
      - run: bun install

      - name: Run migrations
        run: python3 infrastructure/scripts/migrate.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}

      - name: Deploy API
        run: python3 infrastructure/scripts/deploy.api.py staging
        env:
          LAMBDA_API_NAME: ${{ secrets.LAMBDA_API_NAME }}

      - name: Deploy Crons
        run: python3 infrastructure/scripts/deploy.crons.py staging
        env:
          LAMBDA_CRON_NAME: ${{ secrets.LAMBDA_CRON_NAME }}

      - name: Deploy Fronts
        run: python3 infrastructure/scripts/deploy.front.py staging
        env:
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_CLIENT_ID }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL_STAGING }}

  deploy_prod:
    if: github.ref == 'refs/heads/main'
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install boto3 python-dotenv psycopg2-binary
      - run: bun install

      - name: Run migrations
        run: python3 infrastructure/scripts/migrate.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}

      - name: Deploy API
        run: python3 infrastructure/scripts/deploy.api.py prod
        env:
          LAMBDA_API_NAME: ${{ secrets.LAMBDA_API_NAME }}

      - name: Deploy Crons
        run: python3 infrastructure/scripts/deploy.crons.py prod
        env:
          LAMBDA_CRON_NAME: ${{ secrets.LAMBDA_CRON_NAME }}

      - name: Deploy Fronts
        run: python3 infrastructure/scripts/deploy.front.py prod
        env:
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_CLIENT_ID }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL_PROD }}
