services:
  postgres:
    image: postgres:16
    container_name: trellu_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: trellu
      POSTGRES_USER: trellu
      POSTGRES_PASSWORD: trellu
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: trellu_api
    command: bun run --hot src/index.ts
    working_dir: /app/code/api
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://trellu:trellu@postgres:5432/trellu
      PORT: "4000"
    env_file: .env
    volumes:
      - .:/app
      - /app/node_modules

  trellu:
    build: .
    container_name: trellu_front
    command: bun run dev
    working_dir: /app/code/trellu
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules

  trellu_admin:
    build: .
    container_name: trellu_admin_front
    command: bun run dev
    working_dir: /app/code/trellu_admin
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - /app/node_modules

  migrate:
    build: .
    container_name: trellu_migrate
    command: python3 infrastructure/scripts/migrate.py
    working_dir: /app
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://trellu:trellu@postgres:5432/trellu
    volumes:
      - .:/app
    profiles:
      - tools

  deploy:
    build: .
    entrypoint: ["python3"]
    working_dir: /app
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-eu-west-1}
    volumes:
      - .:/app
    profiles:
      - deploy

volumes:
  postgres_data:
